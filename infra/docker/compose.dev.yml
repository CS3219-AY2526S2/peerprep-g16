services:
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../../apps/frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/api-gateway:/app
      - /app/node_modules
    environment:
      - PORT=3000

  user-service:
    build:
      context: ../../apps/user-service
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ../../apps/user-service:/app
      - /app/node_modules
    environment:
      - PORT=3000

  question-service:
    build:
      context: ../../apps/question-service
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    volumes:
      - ../../apps/question-service:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}

  matching-service:
    build:
      context: ../../apps/matching-service
      dockerfile: Dockerfile
    ports:
      - "3003:3000"
    volumes:
      - ../../apps/matching-service:/app
      - /app/node_modules
    environment:
      - PORT=3000

  collaboration-service:
    build:
      context: ../../apps/collaboration-service
      dockerfile: Dockerfile
    ports:
      - "3004:3000"
    volumes:
      - ../../apps/collaboration-service:/app
      - /app/node_modules
    environment:
      - PORT=3000