services:
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../../apps/frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/api-gateway:/app
      - /app/node_modules
    environment:
      - PORT=3000

  user-service:
    build:
      context: ../../apps/user-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ../../apps/user-service:/app
      - /app/node_modules
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  question-service:
    build:
      context: ../../apps/question-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    volumes:
      - ../../apps/question-service:/app
      - /app/node_modules
    environment:
      - PORT=3002
      - MONGODB_URI=${MONGODB_URI}

  matching-service:
    build:
      context: ../../apps/matching-service
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    volumes:
      - ../../apps/matching-service:/app
      - /app/node_modules
    environment:
      - PORT=3004
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  collaboration-service:
    build:
      context: ../../apps/collaboration-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    volumes:
      - ../../apps/collaboration-service:/app
      - /app/node_modules
    environment:
      - PORT=3003
      - REDIS_URL=redis://redis:6379
      - JUDGE0_URL=http://judge0-server:2358
    depends_on:
      - redis
      - judge0-server

  redis:
    image: redis:6.0
    ports:
      - "6379:6379"

  judge0-server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-db:
    image: postgres:13
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
    volumes:
      - judge0-db-data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:6.0

volumes:
  judge0-db-data: