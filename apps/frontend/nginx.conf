server {
    listen 80;
    server_name peerprep16.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name peerprep16.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/peerprep16.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peerprep16.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/user/ {
        proxy_pass http://user-service:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/question/ {
        proxy_pass http://question-service:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/collaboration/ {
        proxy_pass http://collaboration-service:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/matching/ {
        proxy_pass http://matching-service:3004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/judge0/ {
        proxy_pass http://judge0-server:2358/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
