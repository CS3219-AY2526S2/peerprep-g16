name: CI

on:
  pull_request:
  push:

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - apps/question-service
          - apps/matching-service
          - apps/collaboration-service
          # Enable later when user-service has a lint script
          # - apps/user-service

          # api-gateway is excluded for now because it is not part of the current service flow
          # - apps/api-gateway

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  unit-test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    strategy:
      fail-fast: false
      matrix:
        service:
          - apps/question-service
          - apps/matching-service
          - apps/collaboration-service
          # Enable later when user-service has real tests
          # - apps/user-service

          # Enable later only if api-gateway becomes part of the active architecture
          # - apps/api-gateway

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --runInBand

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      # Enable later when frontend test scripts exist
      # - name: Run frontend unit tests
      #   run: npm test

      # Enable later when frontend e2e tests exist
      # - name: Run frontend e2e tests
      #   run: npm run test:e2e

  integration-test:
    runs-on: ubuntu-latest
    needs:
      - unit-test-backend
      - frontend-checks

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create env file for compose
        run: |
          cat > .env <<EOF
          MONGO_USERNAME=${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          DB_CLOUD_URI=${{ secrets.DB_CLOUD_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ENCRYPTION_IV=${{ secrets.ENCRYPTION_IV }}
          QUESTION_SERVICE_MONGODB_URI=${{ secrets.QUESTION_SERVICE_MONGODB_URI }}
          JUDGE0_POSTGRES_DB=${{ secrets.JUDGE0_POSTGRES_DB }}
          JUDGE0_POSTGRES_USER=${{ secrets.JUDGE0_POSTGRES_USER }}
          JUDGE0_POSTGRES_PASSWORD=${{ secrets.JUDGE0_POSTGRES_PASSWORD }}
          EOF

      - name: Build services with Docker Compose
        run: docker compose -f compose.yml build

      - name: Start services
        run: docker compose -f compose.yml up -d

      - name: Wait for containers
        run: sleep 30

      - name: Show container status
        run: docker compose -f compose.yml ps

      - name: Smoke test user-service
        run: curl --fail http://localhost:3001/health

      # Add more real integration checks later, for example:
      # - name: Smoke test question-service
      #   run: curl --fail http://localhost:3002
      #
      # - name: Smoke test collaboration-service
      #   run: curl --fail http://localhost:3003
      #
      # - name: Run backend e2e tests
      #   run: |
      #     cd apps/question-service && npm run test:e2e
      #     cd ../matching-service && npm run test:e2e
      #     cd ../collaboration-service && npm run test:e2e

      - name: Show logs on failure
        if: failure()
        run: docker compose -f compose.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f compose.yml down -v
