name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_RESOURCE_PREFIX: ${{ vars.AWS_RESOURCE_PREFIX || 'peerprep' }}
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX || 'peerprep' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  CODEDEPLOY_APPLICATION: ${{ vars.CODEDEPLOY_APPLICATION }}
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build-scan-push:
    name: Build, scan, and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            context: ./apps/user-service
          - service: question-service
            context: ./apps/question-service
          - service: collaboration-service
            context: ./apps/collaboration-service
          - service: matching-service
            context: ./apps/matching-service
          - service: code-executor
            context: ./apps/code-executor
          - service: frontend
            context: ./apps/frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          push: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:latest
          build-args: |
            VITE_USER_SERVICE_URL=${{ vars.VITE_USER_SERVICE_URL }}
            VITE_QUESTION_SERVICE_URL=${{ vars.VITE_QUESTION_SERVICE_URL }}
            VITE_COLLABORATION_SERVICE_URL=${{ vars.VITE_COLLABORATION_SERVICE_URL }}
            VITE_MATCHING_SERVICE_URL=${{ vars.VITE_MATCHING_SERVICE_URL }}
            VITE_JUDGE0_URL=${{ vars.VITE_JUDGE0_URL }}

      - name: Scan image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push image
        env:
          IMAGE_URI: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}
        run: |
          docker push "$IMAGE_URI:${IMAGE_TAG}"
          docker push "$IMAGE_URI:latest"

  deploy:
    name: Blue/green deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-scan-push
    environment:
      name: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            container: user-service
            appspec: .aws/appspec/user-service.yaml
          - service: question-service
            container: question-service
            appspec: .aws/appspec/question-service.yaml
          - service: collaboration-service
            container: collaboration-service
            appspec: .aws/appspec/collaboration-service.yaml
          - service: matching-service
            container: matching-service
            appspec: .aws/appspec/matching-service.yaml
          - service: code-executor
            container: code-executor
            appspec: .aws/appspec/code-executor.yaml
          - service: frontend
            container: frontend
            appspec: .aws/appspec/frontend.yaml

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${AWS_RESOURCE_PREFIX}-${{ matrix.service }}" \
            --query taskDefinition \
            > task-definition.json

      - name: Render image into task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.container }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:${{ env.IMAGE_TAG }}

      - name: Deploy with CodeDeploy blue/green
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.AWS_RESOURCE_PREFIX }}-${{ matrix.service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          codedeploy-appspec: ${{ matrix.appspec }}
          codedeploy-application: ${{ env.CODEDEPLOY_APPLICATION }}
          codedeploy-deployment-group: ${{ env.AWS_RESOURCE_PREFIX }}-${{ matrix.service }}
