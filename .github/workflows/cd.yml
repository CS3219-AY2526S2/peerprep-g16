name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/peerprep

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: question-service
            context: ./apps/question-service
          - service: matching-service
            context: ./apps/matching-service
          - service: collaboration-service
            context: ./apps/collaboration-service
          - service: frontend
            context: ./apps/frontend
          # Enable later when user-service is ready for release
          # - service: user-service
          #   context: ./apps/user-service

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

  security-scan:
    runs-on: ubuntu-latest
    needs: build-images
    strategy:
      fail-fast: false
      matrix:
        service:
          - question-service
          - matching-service
          - collaboration-service
          - frontend
          # Enable later when user-service is released
          # - user-service

    steps:
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  push-images:
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: question-service
            context: ./apps/question-service
          - service: matching-service
            context: ./apps/matching-service
          - service: collaboration-service
            context: ./apps/collaboration-service
          - service: frontend
            context: ./apps/frontend
          # Enable later when user-service is ready for release
          # - service: user-service
          #   context: ./apps/user-service

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: push-images
    environment:
      name: staging

    steps:
      - name: Deploy to staging
        run: echo "Replace with your real staging deployment command"

  e2e-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: staging

    steps:
      - name: Run end-to-end tests
        run: echo "Replace with your real staging E2E command"

  deploy-production:
    runs-on: ubuntu-latest
    needs: e2e-staging
    environment:
      name: production

    steps:
      - name: Deploy to production
        run: echo "Replace with your real production deployment command"
